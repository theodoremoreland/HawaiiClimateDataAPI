<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A REST API for Hawaii climate data with returns in JSON format.">
        <title>
            Hawaii Climate Data API
        </title>
        <link rel="icon" type="image/png" href="../static/images/hawaii.png">
        <link rel="stylesheet" href="../static/css/waves.css">
        <link rel="stylesheet" href="../static/css/style.css">
    </head>

    <body>
        <div id="preview-container">
            <div id="analysis-preview">
                <div class="text-container">
                    <a href="/analysis" title="Analysis of Hawaii climate data in the form of a Jupyter Notebook.">
                        <button type="button">
                            Analysis
                        </button>
                    </a>
                    <div class="overlay"></div>
                </div>
                <img class="preview" src="../static/images/climate_analysis_preview.png" alt="climate analysis preview" />
            </div>
            <div id="docs-preview">
                <div class="text-container">
                    <a href="https://github.com/theodoremoreland/HawaiiClimateDataAPI" target="_blank" title="Documentation for the Hawaii Climate Data API.">
                        <button type="button">
                            Docs
                        </button>
                    </a>
                    <div class="overlay"></div>
                </div>
                <img class="preview" src="../static/images/docs_preview.png" alt="API documentation preview" />
            </div>
        </div>
        <ul>
            <li>
                <a title="Returns precipitation of each day in Hawaii for the last 12 months
                of data-set." href="/api/v2/precipitation">
                    <button type="button">
                        Precipitation data
                    </button>
                </a>
                <div class="overlay"></div>
            </li>
            <li>
                <a title="Returns weather station IDs of weather stations
                used in data." href="/api/v2/stations">
                    <button type="button">
                        Weather station IDs
                    </button>
                </a>
                <div class="overlay"></div>
            </li>
            <li>
                <a title="Returns temperature observation data (tobs) for the last
                12 months of data-set. Represents a temperature for each day." href="/api/v2/tobs">
                    <button type="button">
                        Temperature observation data
                    </button>
                </a>
                <div class="overlay"></div>
            </li>
        </ul>
        <div class="intro">
            <h1>Hawaii Climate Data API</h1>
            <p>
                A REST API with returns in JSON format.
            </p>
            <div class="ocean">
                <div class="wave"></div>
                <div class="wave"></div>
            </div>
        </div>
    </body>

</html>
